name: ml-app

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlapp}
      POSTGRES_DB: ${POSTGRES_DB:-mlapp}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlapp} -d ${POSTGRES_DB:-mlapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mlapp}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-mlapp-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://mlapp:mlapp@postgres:5432/mlapp}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-minio:9000}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data

  worker:
    build:
      context: ./backend
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=INFO
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://mlapp:mlapp@postgres:5432/mlapp}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-minio:9000}
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src

  model-runtime:
    profiles:
      - serving
    build:
      context: ./services/model-runtime
    environment:
      MODEL_ARTIFACT_URI: ${MODEL_ARTIFACT_URI:-/models/model.joblib}
    ports:
      - "8010:8000"
    volumes:
      - ./models:/models:ro

volumes:
  postgres-data:
  minio-data:

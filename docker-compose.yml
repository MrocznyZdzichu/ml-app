name: ml-app

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlapp}
      POSTGRES_DB: ${POSTGRES_DB:-mlapp}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlapp} -d ${POSTGRES_DB:-mlapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mlapp}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-mlapp-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://mlapp:mlapp@postgres:5432/mlapp}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-minio:9000}
      MODEL_RUNTIME_URL: ${MODEL_RUNTIME_URL:-http://model-runtime:8000}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      model-runtime:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests:ro
      - ./examples:/app/examples:ro
      - ./data:/app/data

  worker:
    build:
      context: ./backend
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=INFO --concurrency=${PROFILE_WORKER_CONCURRENCY:-2} --prefetch-multiplier=1 --queues=celery,analytics,ml,serving,exports
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://mlapp:mlapp@postgres:5432/mlapp}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-minio:9000}
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests:ro
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src

  model-runtime:
    build:
      context: ./services/model-runtime
    environment:
      MODEL_REPOSITORY_ROOT: /app/data/repository
    volumes:
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:
